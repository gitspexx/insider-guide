services:
  maps-spexx:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: maps-spexx
    restart: unless-stopped
    ports:
      - "127.0.0.1:3013:80"
    networks:
      - web

networks:
  web:
    external: true
