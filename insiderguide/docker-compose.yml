services:
  insider-guide-back:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_VPS_API: ${VITE_VPS_API}
        VITE_VPS_KEY: ${VITE_VPS_KEY}
        VITE_GA4_ID: ${VITE_GA4_ID}
        VITE_META_PIXEL_ID: ${VITE_META_PIXEL_ID}
        VITE_TIKTOK_PIXEL_ID: ${VITE_TIKTOK_PIXEL_ID}
        VITE_CAPI_RELAY_URL: ${VITE_CAPI_RELAY_URL}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: insider-guide-back
    restart: unless-stopped
    ports:
      - "127.0.0.1:3013:80"
    networks:
      - web

  insider-guide-front:
    build:
      context: ../maps-front
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_GA4_ID: ${VITE_GA4_ID}
        VITE_META_PIXEL_ID: ${VITE_META_PIXEL_ID}
        VITE_TIKTOK_PIXEL_ID: ${VITE_TIKTOK_PIXEL_ID}
        VITE_CAPI_RELAY_URL: ${VITE_CAPI_RELAY_URL}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: insider-guide-front
    restart: unless-stopped
    ports:
      - "127.0.0.1:3019:80"
    networks:
      - web

networks:
  web:
    external: true
