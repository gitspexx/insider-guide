<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argentina Travel Guide by @Alexspexx</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1a1a;--cream:#f5f0e8;--accent:#c4553a;--gold:#c9a84c;--slate:#6b7280;--light:#faf8f4}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden}

.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;background:linear-gradient(165deg,#1a1a1a 0%,#2d2520 40%,#3d2e25 70%,#4a352a 100%)}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-content{position:relative;z-index:2;padding:2rem}
.hero-tag{font-size:.75rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;font-weight:500;opacity:0;animation:fadeUp .8s ease forwards .3s}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(3.5rem,10vw,8rem);font-weight:900;color:#fff;line-height:.95;opacity:0;animation:fadeUp .8s ease forwards .5s}
.hero h1 span{display:block;font-style:italic;font-weight:400;color:var(--gold);font-size:.45em;margin-top:.3em}
.hero-stats{display:flex;gap:2.5rem;margin-top:2.5rem;justify-content:center;opacity:0;animation:fadeUp .8s ease forwards .8s}
.hero-stat{text-align:center;color:rgba(255,255,255,.7)}
.hero-stat strong{display:block;font-family:'Playfair Display';font-size:2rem;color:#fff}
.hero-stat small{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase}
.scroll-hint{position:absolute;bottom:5rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* CITY NAV */
.city-nav{position:sticky;top:0;z-index:100;background:rgba(26,26,26,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:.6rem 1rem}
.city-nav-inner{max-width:960px;margin:0 auto;display:flex;gap:.4rem;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.city-nav-inner::-webkit-scrollbar{display:none}
.city-btn{border:none;background:transparent;padding:.45rem .9rem;border-radius:100px;font-family:'DM Sans';font-size:.72rem;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;transition:all .25s;letter-spacing:.01em}
.city-btn:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.06)}
.city-btn.active{background:var(--gold);color:#1a1a1a;font-weight:600}
.city-btn .cnt{font-size:.6rem;opacity:.6;margin-left:3px}

/* CAT PILLS */
.cat-nav{max-width:960px;margin:0 auto;padding:1rem 1rem .3rem;display:flex;gap:.4rem;flex-wrap:wrap}
.cat-pill{border:1px solid rgba(0,0,0,.08);background:var(--light);padding:.4rem .85rem;border-radius:100px;font-family:'DM Sans';font-size:.72rem;font-weight:500;color:var(--slate);cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:.3rem}
.cat-pill:hover{border-color:rgba(0,0,0,.15)}
.cat-pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.cat-pill .cnt{font-size:.6rem;opacity:.5}

/* SEARCH */
.search-wrap{max-width:960px;margin:0 auto;padding:.8rem 1rem;position:relative}
.search-box{width:100%;padding:.75rem 1rem .75rem 2.6rem;border:1px solid rgba(0,0,0,.08);border-radius:12px;font-family:'DM Sans';font-size:.85rem;background:var(--light);outline:none;transition:all .25s}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,85,58,.08)}
.search-icon{position:absolute;left:1.8rem;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--slate);opacity:.35}

/* CONTENT */
.guide-body{max-width:960px;margin:0 auto;padding:.5rem 1rem 2rem}

/* CITY SECTION */
.city-section{margin-bottom:2.5rem}
.city-header{display:flex;align-items:baseline;gap:.8rem;margin-bottom:.3rem;padding-top:.8rem}
.city-name{font-family:'Playfair Display';font-size:1.5rem;font-weight:700}
.city-count{font-size:.7rem;color:var(--slate);letter-spacing:.08em}

/* CAT GROUP IN CITY */
.cat-group{margin-bottom:1.2rem}
.cat-group-header{display:flex;align-items:center;gap:.5rem;padding:.5rem 0 .3rem;font-size:.78rem;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.08em}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-eat .cat-dot{background:#c4553a}
.cat-cafe .cat-dot{background:#2d6a4f}
.cat-drink .cat-dot{background:#7c3aed}
.cat-see .cat-dot{background:#c9a84c}
.cat-stay .cat-dot{background:#3b82f6}

/* PLACE CARDS */
.places-list{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.place-card{display:flex;align-items:center;justify-content:space-between;background:var(--light);border:1px solid rgba(0,0,0,.04);border-radius:10px;padding:.65rem .9rem;transition:all .2s;cursor:pointer;text-decoration:none;color:inherit;gap:.5rem}
.place-card:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.06);border-color:rgba(0,0,0,.08)}
.place-name{font-weight:500;font-size:.82rem;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.place-arrow{color:var(--slate);opacity:.2;transition:all .2s;font-size:.75rem;flex-shrink:0}
.place-card:hover .place-arrow{opacity:.6;transform:translateX(2px)}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--slate);font-size:.88rem}

.guide-footer{text-align:center;padding:3.5rem 1rem 2rem;border-top:1px solid rgba(0,0,0,.06)}
.guide-footer .brand{font-family:'Playfair Display';font-size:1.2rem;font-weight:700;margin-bottom:.4rem}
.guide-footer p{color:var(--slate);font-size:.78rem;line-height:1.8}

@media(max-width:640px){
.places-list{grid-template-columns:1fr}
.hero h1{font-size:3.2rem}
.hero-stats{gap:1.2rem}
}
@media print{.city-nav,.cat-nav,.search-wrap,.scroll-hint{display:none}.hero{min-height:auto;padding:3rem 2rem;page-break-after:always}.place-card{break-inside:avoid}}
</style>
</head>

const CITIES = [
{id:'all',label:'All Cities',emoji:'🇦🇷'},
{id:'Buenos Aires',label:'Buenos Aires',emoji:'🏙️'},
{id:'Bariloche & Lakes',label:'Bariloche & Lakes',emoji:'🏔️'},
{id:'Iguazú & Northeast',label:'Iguazú & Northeast',emoji:'🌊'},
{id:'Córdoba',label:'Córdoba',emoji:'🏛️'},
{id:'Jujuy & Quebrada',label:'Jujuy & Quebrada',emoji:'🌈'},
{id:'Salta',label:'Salta',emoji:'⛪'},
{id:'Patagonia South',label:'Patagonia South',emoji:'🧊'},
{id:'Catamarca & Puna',label:'Catamarca & Puna',emoji:'🏜️'},
{id:'Cafayate',label:'Cafayate',emoji:'🍇'},
{id:'Mendoza',label:'Mendoza',emoji:'🍷'},
];

const CATS = [
{id:'all',label:'All',icon:'🗺️'},
{id:'eat',label:'Where to Eat',icon:'🍽️',cls:'cat-eat'},
{id:'cafe',label:'Cafés',icon:'☕',cls:'cat-cafe'},
{id:'drink',label:'Drinks & Bars',icon:'🍷',cls:'cat-drink'},
{id:'see',label:'See & Do',icon:'✨',cls:'cat-see'},
{id:'stay',label:'Stay',icon:'🏨',cls:'cat-stay'},
];

let activeCity = 'all';
let activeCat = 'all';

function getFiltered(){
  let d = DATA;
  const q = document.getElementById('searchBox').value.toLowerCase();
  if(activeCity!=='all') d = d.filter(x=>x.y===activeCity);
  if(activeCat!=='all') d = d.filter(x=>x.c===activeCat);
  if(q) d = d.filter(x=>x.t.toLowerCase().includes(q));
  return d;
}

function render(){
  const filtered = getFiltered();

  // City nav
  const cn = document.getElementById('cityNav');
  cn.innerHTML = CITIES.map(c=>{
    const cnt = c.id==='all'? DATA.length : DATA.filter(x=>x.y===c.id).length;
    if(cnt===0 && c.id!=='all') return '';
    return `<button class="city-btn ${activeCity===c.id?'active':''}" onclick="activeCity='${c.id}';render()">
    ${c.emoji} ${c.label}<span class="cnt">${cnt}</span></button>`;
  }).join('');

  // Cat pills
  const catn = document.getElementById('catNav');
  const base = activeCity==='all'? DATA : DATA.filter(x=>x.y===activeCity);
  catn.innerHTML = CATS.map(c=>{
    const cnt = c.id==='all'? base.length : base.filter(x=>x.c===c.id).length;
    if(cnt===0 && c.id!=='all') return '';
    return `<button class="cat-pill ${activeCat===c.id?'active':''}" onclick="activeCat='${c.id}';render()">
    ${c.icon} ${c.label}<span class="cnt">${cnt}</span></button>`;
  }).join('');

  // Body - group by city, then by category
  const body = document.getElementById('guideBody');

  if(!filtered.length){
    body.innerHTML = '<div class="empty-state">No places match. Try a different search or filter.</div>';
    return;
  }

  // Group by city
  const cityOrder = CITIES.filter(c=>c.id!=='all').map(c=>c.id);
  const byCityMap = {};
  filtered.forEach(p=>{
    if(!byCityMap[p.y]) byCityMap[p.y] = [];
    byCityMap[p.y].push(p);
  });

  let html = '';
  cityOrder.forEach(cityId=>{
    const cityPlaces = byCityMap[cityId];
    if(!cityPlaces || !cityPlaces.length) return;
    const cityInfo = CITIES.find(c=>c.id===cityId);

    html += `<section class="city-section" id="city-${cityId.replace(/[^a-z]/gi,'')}">
    <div class="city-header">
      <span class="city-name">${cityInfo.emoji} ${cityInfo.label}</span>
      <span class="city-count">${cityPlaces.length} places</span>
    </div>`;

    // Group by category within city
    const catOrder = CATS.filter(c=>c.id!=='all');
    catOrder.forEach(cat=>{
      const items = cityPlaces.filter(p=>p.c===cat.id);
      if(!items.length) return;
      html += `<div class="cat-group ${cat.cls||''}">
        <div class="cat-group-header"><span class="cat-dot"></span>${cat.icon} ${cat.label}</div>
        <div class="places-list">
        ${items.map(p=>`<a class="place-card" href="${p.u}" target="_blank" rel="noopener">
          <span class="place-name">${p.t}</span>
          <span class="place-arrow">→</span>
        </a>`).join('')}
        </div></div>`;
    });

    html += '</section>';
  });

  body.innerHTML = html;
}

document.getElementById('searchBox').addEventListener('input', render);
render();
</script>
</body>
</html>
